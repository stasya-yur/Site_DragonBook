<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookDragon</title>
    
    <script type="text/javascript" src="../js/jquery-3.7.1.js"></script>
    <!--Иконки-->
    <link rel="apple-touch-icon" sizes="180x180" href="../img/icon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../img/icon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../img/icon/favicon-16x16.png">
    <link rel="mask-icon" href="../img/icon/safari-pinned-tab.svg" color="#5bbad5">
    <meta name="msapplication-TileColor" content="#00aba9">
    <meta name="theme-color" content="#ffffff">

     <!--Файлы стилей-->
    <link rel="stylesheet" href="../css/index.css">
     <link rel="stylesheet" href="../css/order-control.css">
     <link rel="stylesheet" href="../css/order-cart.css">
     <script src="../js/elements.js" defer></script>
</head>
<body>
    <!--Шапка сайта-->
    <div id="header"></div>
    <!--Управление заказами -->
<main>
    <div class="container control__container">
        <div class="control__sort">
            <div class="control__sort-title">За датою</div>
            <div class="control__sort-buttons"><button class="control__sort-btn">&#9650;</button><button class="control__sort-btn">&#9660;</button></div>
        </div>
        <div class="control__orders">
            <div class="control__order-cart"> <!--Карточка заказа-->
                <div class="order-cart__title">ID 1276823</div>
                <ul class="order-cart__list">
                    <li class="order-cart__item"> <!--Состав заказа-->
                        <img class="order-cart__image" src="../img/books/book_1.jpg" alt="Посібник зі знищення вампірів">

                        <div class="order-cart__product">
                            <h3 class="order-cart__product-title">Посібник зі знищення вампірів</h3> <!--Название тайтла-->

                            <p class="order-cart__product-author">Ґрейді Гендрікс</p> <!--Автор-->
                        </div>
                        <div class="order-cart__wrapper">
                            <div class="order-cart__product-count count">
                                <p class="count__amount">1</p> <!--Количество книжек-->
                            </div>
                            <p class="order-cart__product-price">300<span class="currency">₴</span></p> <!--Цена-->
                        </div>
                    </li>
                </ul>
                <div class="order-cart__control-wrapper">
                    <select class="order-cart__select" id="status" name="status">
                        <option value="new">Створено</option>
                        <option value="paid">Оплачено</option>
                        <option value="kit">Комплектується</option>
                        <option value="delivering">Доставляється</option>
                        <option value="done">Виконано</option>
                        <option value="cancelled">Скасовано</option>
                    </select>
                    <div class="order-cart__delivery">Самовивіз</div>
                    <button class="order-cart__select-btn">Зберегти</button>
                    <div class="order-cart__date">05.05.2024</div>

                </div>
            </div>

        </div>
    </div>
</main>
<!--Подвал-->
<div id="footer"></div>

<script src="../js/order_cart.js" defer></script>
</body>
</html>
