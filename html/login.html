<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../css/index.css">
    <link rel="stylesheet" href="../css/login.css">
    
    <script src="../js/script_log.js" defer></script>
    <script src="../js/elements.js" defer></script>
</head>
<body>

    <!--Шапка сайта-->
    <div id="header"></div>

    <main class="main-log">
            <article class="containerlog">
                <div class="blocklog">
                    <section class="block_item block-item">
                        <h2 class="block-item_title">Я вже маю акаунт</h2>
                        <button class="block-item_btn signin-btn">Увійти</button>
                    </section>
                    <section class="block_item block-item">
                        <h2 class="block-item_title">В мене не має акаунта</h2>
                        <button class="block-item_btn signup-btn">Зареєструватися</button>
                    </section>
                </div>
                <!--Формы, с которых получаешь данные, можешь добавить айдишники или как ты там это хочешь сделать-->
                <div class="form-box">
                    <!--Вот с этой формы получать данные для фхода-->
                    <form action="#" class="form form_signin">
                        <h3 class="form_title">Вхід</h3>
                        <p>
                            <input type="text" class="form_input" placeholder="Username">
                        </p>
                        <p>
                            <input type="password" class="form_input" placeholder="Password"></p>
                        <p>
                            <button class="form_btn signin">Увійти</button>
                        </p>
                        <p>
                            <a href="#!" class="form_forgot">Забули пароль?</a>
                        </p>
                    </form>
                    <!--А с этой формы - для регистрации-->
                    <form action="#" class="form form_signup">
                        <h3 class="form_title">Реєстрація</h3>
                        <p>
                            <input type="text" class="form_input" placeholder="Username">
                        </p>
                        <p>
                            <input type="text" class="form_input" placeholder="E-mail">
                        </p>
                        <p>
                            <input type="password" class="form_input" placeholder="Password"></p>
                        <p>
                        <p>
                            <input type="password" class="form_input" placeholder="Confirm password"></p>
                        <p>    
                            <button class="form_btn form_btn_signup signup">Зареєструватися</button>
                        </p>
                    </form>

                </div>
            </article>
    </main>
    <div id="footer"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.3/jquery.min.js" 
    integrity="sha512-STof4xm1wgkfm7heWqFJVn58Hm3EtS31XFaagaa8VMReCXAkQnJZ+jEy8PCC/iT18dFy95WcExNHFTqLyp72eQ==" 
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    
    <script src="./js/main.js"></script>
</body>
</html>
